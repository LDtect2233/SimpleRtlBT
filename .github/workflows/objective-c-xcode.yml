name: Xcode - Build and Analyze

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    name: Build and analyse default scheme using xcodebuild command
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Debug project file
        run: |
          echo "=== Lines 338-346 ==="
          sed -n '338,346p' SimpleRtlBt.xcodeproj/project.pbxproj
          echo "=== plutil lint ==="
          plutil -lint SimpleRtlBt.xcodeproj/project.pbxproj || true
          
      - name: Debug raw bytes
        run: |
          xxd SimpleRtlBt.xcodeproj/project.pbxproj | head -20
          echo "---"
          wc -l SimpleRtlBt.xcodeproj/project.pbxproj
          echo "---"
          file SimpleRtlBt.xcodeproj/project.pbxproj

      - name: Install xcpretty
        run: gem install xcpretty

      - name: Set Default Scheme
        run: |
          scheme_list=$(xcodebuild -list -json -project SimpleRtlBt.xcodeproj | tr -d "\n")
          default=$(echo $scheme_list | ruby -e "require 'json'; puts JSON.parse(STDIN.gets)['project']['targets'][0]")
          echo $default | cat >default
          echo Using default scheme: $default

      - name: Build
        env:
          scheme: ${{ 'default' }}
        run: |
          if [ $scheme = default ]; then scheme=$(cat default); fi
          if [ "`ls -A | grep -i \\.xcworkspace\$`" ]; then filetype_parameter="workspace" && file_to_build="`ls -A | grep -i \\.xcworkspace\$`"; else filetype_parameter="project" && file_to_build="`ls -A | grep -i \\.xcodeproj\$`"; fi
          file_to_build=`echo $file_to_build | awk '{$1=$1;print}'`
          xcodebuild clean build analyze -scheme "$scheme" -"$filetype_parameter" "$file_to_build" | xcpretty && exit ${PIPESTATUS[0]}
